<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirit Bird Chat</title>
    <style>
        body {
            font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif);
            font-size: var(--vscode-font-size, 13px);
            color: var(--vscode-editor-foreground, #cccccc);
            background-color: var(--vscode-editor-background, #1e1e1e);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Tabs Header */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--vscode-panel-border, #3c3c3c);
            background-color: var(--vscode-sideBar-background, #252526);
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: var(--vscode-tab-inactiveForeground, #8e8e8e);
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            outline: none;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .tab-btn:hover {
            color: var(--vscode-tab-activeForeground, #ffffff);
        }
        .tab-btn.active {
            color: var(--vscode-tab-activeForeground, #ffffff);
            border-bottom-color: var(--vscode-activityBar-activeBorder, #007acc);
            background-color: var(--vscode-tab-activeBackground, #1e1e1e);
        }

        /* Tab Content */
        .tab-content {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
            padding: 12px;
            box-sizing: border-box;
        }
        .tab-content.active {
            display: flex;
        }

        /* Chat Area */
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
        }
        .message {
            max-width: 90%;
            padding: 8px 12px;
            border-radius: 6px;
            line-height: 1.4;
            word-wrap: break-word;
            font-size: 12.5px;
        }
        .message.user {
            align-self: flex-end;
            background-color: var(--vscode-button-background, #007acc);
            color: var(--vscode-button-foreground, #ffffff);
        }
        .message.assistant {
            align-self: flex-start;
            background-color: var(--vscode-button-secondaryBackground, #3a3d41);
            color: var(--vscode-button-secondaryForeground, #ffffff);
            border: 1px solid var(--vscode-panel-border, #3c3c3c);
        }
        .message.error {
            align-self: center;
            background-color: var(--vscode-inputValidation-errorBackground, #5a1d1d);
            color: var(--vscode-inputValidation-errorForeground, #f8a8a8);
            border: 1px solid var(--vscode-inputValidation-errorBorder, #be1100);
            width: 95%;
        }
        
        /* Input & Controls */
        .input-container {
            display: flex;
            gap: 6px;
            background-color: var(--vscode-input-background, #3c3c3c);
            border: 1px solid var(--vscode-input-border, transparent);
            border-radius: 4px;
            padding: 4px 6px;
            align-items: center;
        }
        .input-container:focus-within {
            border-color: var(--vscode-focusBorder, #007acc);
        }
        #chat-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--vscode-input-foreground, #cccccc);
            resize: none;
            height: 24px;
            outline: none;
            font-family: inherit;
            font-size: 13px;
        }
        #send-btn {
            background-color: var(--vscode-button-background, #007acc);
            color: var(--vscode-button-foreground, #ffffff);
            border: none;
            border-radius: 4px;
            padding: 4px 10px;
            cursor: pointer;
            font-weight: bold;
        }
        #send-btn:hover {
            background-color: var(--vscode-button-hoverBackground, #118ad4);
        }
        #send-btn:disabled {
            background-color: var(--vscode-button-secondaryBackground, #3a3d41);
            color: var(--vscode-button-secondaryForeground, #8e8e8e);
            cursor: not-allowed;
        }

        /* Settings Form */
        .form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        label {
            font-weight: bold;
            color: var(--vscode-foreground, #cccccc);
        }
        input, select {
            background-color: var(--vscode-input-background, #3c3c3c);
            color: var(--vscode-input-foreground, #cccccc);
            border: 1px solid var(--vscode-input-border, #3c3c3c);
            border-radius: 4px;
            padding: 6px 8px;
            outline: none;
            font-family: inherit;
        }
        input:focus, select:focus {
            border-color: var(--vscode-focusBorder, #007acc);
        }
        .save-btn {
            background-color: var(--vscode-button-background, #007acc);
            color: var(--vscode-button-foreground, #ffffff);
            border: none;
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 8px;
            text-align: center;
        }
        .save-btn:hover {
            background-color: var(--vscode-button-hoverBackground, #118ad4);
        }

        /* Loading typing indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 8px 12px;
            background-color: var(--vscode-button-secondaryBackground, #3a3d41);
            border-radius: 6px;
            font-style: italic;
            color: var(--vscode-descriptionForeground, #8e8e8e);
        }
    </style>
</head>
<body>
    <!-- Navigation Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('chat')">Chat</button>
        <button class="tab-btn" onclick="switchTab('settings')">Settings</button>
    </div>

    <!-- Chat Tab Content -->
    <div id="chat-tab" class="tab-content active">
        <div id="chat-messages">
            <div class="message assistant">
                Hello! I am <strong>Spirit Bird</strong>, your educational coding companion. How can I help you program today?
            </div>
        </div>
        <div id="typing-indicator" class="typing-indicator">Spirit Bird is thinking...</div>
        <div class="input-container">
            <textarea id="chat-input" placeholder="Ask Spirit Bird to write code..." onkeydown="handleKeyPress(event)"></textarea>
            <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- Settings Tab Content -->
    <div id="settings-tab" class="tab-content">
        <div class="form-group">
            <label for="setting-endpoint">Backend Endpoint URL</label>
            <input type="text" id="setting-endpoint" placeholder="http://localhost:9000/api">
        </div>
        <div class="form-group">
            <label for="setting-apikey">User Authentication Token (JWT)</label>
            <input type="password" id="setting-apikey" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...">
        </div>
        <div class="form-group">
            <label for="setting-space">CodexSpace Slug</label>
            <select id="setting-space">
                <option value="code-lab">code-lab (Gemma 4 Code Lab)</option>
                <option value="spirit-book">spirit-book (Spirit Book)</option>
                <option value="trading-space">trading-space (FinTrader Analytics)</option>
                <option value="general">general (General Space)</option>
            </select>
        </div>
        <button class="save-btn" onclick="saveSettings()">Save Settings</button>
    </div>

    <script>
        const vscode = acquireVsCodeApi();

        // Switch Tabs
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            if (tabId === 'chat') {
                document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
                document.getElementById('chat-tab').classList.add('active');
            } else {
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                document.getElementById('settings-tab').classList.add('active');
                // Request current settings configuration on tab open
                vscode.postMessage({ type: 'getSettings' });
            }
        }

        // Handle enter to submit message
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Send user prompt to extension
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const promptText = input.value.trim();
            if (!promptText) return;

            // Add user message to UI
            appendMessage('user', promptText);
            input.value = '';

            // Show typing indicator
            document.getElementById('typing-indicator').style.display = 'block';
            document.getElementById('send-btn').disabled = true;

            // Send to extension host
            vscode.postMessage({
                type: 'sendMessage',
                prompt: promptText
            });

            // Scroll to bottom
            scrollToBottom();
        }

        // Save settings to VSCode Workspace configuration
        function saveSettings() {
            const endpoint = document.getElementById('setting-endpoint').value.trim();
            const apiKey = document.getElementById('setting-apikey').value.trim();
            const spaceSlug = document.getElementById('setting-space').value;

            vscode.postMessage({
                type: 'saveSettings',
                endpoint,
                apiKey,
                spaceSlug
            });
        }

        // Append message to UI
        function appendMessage(role, text) {
            const container = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            // Format newlines
            msgDiv.innerHTML = text.replace(/\n/g, '<br>').replace(/\t/g, '&nbsp;&nbsp;&nbsp;&nbsp;');
            container.appendChild(msgDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-messages');
            container.scrollTop = container.scrollHeight;
        }

        // Listen for messages from extension host
        window.addEventListener('message', event => {
            const message = event.data;
            switch (message.type) {
                case 'response':
                    // Hide typing indicator
                    document.getElementById('typing-indicator').style.display = 'none';
                    document.getElementById('send-btn').disabled = false;
                    appendMessage('assistant', message.text);
                    break;
                case 'error':
                    document.getElementById('typing-indicator').style.display = 'none';
                    document.getElementById('send-btn').disabled = false;
                    appendMessage('error', `Error: ${message.text}`);
                    break;
                case 'loadSettings':
                    document.getElementById('setting-endpoint').value = message.endpoint || '';
                    document.getElementById('setting-apikey').value = message.apiKey || '';
                    document.getElementById('setting-space').value = message.spaceSlug || 'code-lab';
                    break;
            }
        });

        // Initialize state by requesting settings
        vscode.postMessage({ type: 'getSettings' });
    </script>
</body>
</html>
