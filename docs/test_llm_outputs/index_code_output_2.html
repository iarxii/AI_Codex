<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fireworks Visualizer</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#000;}
    canvas{display:block;}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    // ----- Canvas setup -------------------------------------------------
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    // ----- Utility ------------------------------------------------------
    const random = (min,max)=> Math.random()*(max-min)+min;

    // ----- Particle ------------------------------------------------------
    class Particle{
      constructor(x,y,velX,velY,color){
        this.x = x; this.y = y;
        this.velX = velX; this.velY = velY;
        this.alpha = 1;
        this.decay = random(0.015,0.03);
        this.gravity = 0.05;
        this.size = random(2,4);
        this.color = color;
      }
      update(){
        this.velY += this.gravity;
        this.x += this.velX;
        this.y += this.velY;
        this.alpha -= this.decay;
      }
      draw(){
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
      }
      isAlive(){ return this.alpha > 0; }
    }

    // ----- Firework (rocket) ---------------------------------------------
    class Firework{
      constructor(x,y){
        this.x = x;
        this.y = y;
        this.velY = random(-12,-8);
        this.exploded = false;
        this.particles = [];
        this.hue = Math.floor(random(0,360));
      }
      update(){
        if(!this.exploded){
          this.y += this.velY;
          this.velY += 0.2; // gravity slows the ascent
          if(this.velY >= 0){ this.explode(); }
        }
        this.particles.forEach(p=>p.update());
        this.particles = this.particles.filter(p=>p.isAlive());
      }
      explode(){
        this.exploded = true;
        const count = random(80,120);
        for(let i=0;i<count;i++){
          const angle = random(0, Math.PI*2);
          const speed = random(2,8);
          const velX = Math.cos(angle)*speed;
          const velY = Math.sin(angle)*speed;
          const color = `hsl(${this.hue},100%,60%)`;
          this.particles.push(new Particle(this.x, this.y, velX, velY, color));
        }
      }
      draw(){
        // draw ascending rocket as a small bright point
        if(!this.exploded){
          ctx.globalAlpha = 1;
          ctx.fillStyle = `hsl(${this.hue},100%,80%)`;
          ctx.beginPath(); ctx.arc(this.x,this.y,3,0,Math.PI*2); ctx.fill();
        }
        this.particles.forEach(p=>p.draw());
      }
      isAlive(){ return !this.exploded || this.particles.length>0; }
    }

    // ----- Main loop & storage -------------------------------------------
    const fireworks = [];

    function launch(x, y){
      fireworks.push(new Firework(x, y));
    }

    // auto‑launch every ~800‑ms
    setInterval(()=> launch(random(canvas.width*0.2, canvas.width*0.8), canvas.height), 800);

    // click‑launch
    canvas.addEventListener('click', e=> launch(e.clientX, canvas.height));

    function loop(){
      // fade to create trails
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.fillRect(0,0,canvas.width,canvas.height);

      ctx.globalCompositeOperation = 'lighter';
      fireworks.forEach(w=>{ w.update(); w.draw(); });
      // keep only alive fireworks
      for(let i=fireworks.length-1;i>=0;i--){
        if(!fireworks[i].isAlive()) fireworks.splice(i,1);
      }
      ctx.globalCompositeOperation = 'source-over';
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
